<style>
*{box-sizing:border-box;margin:0;padding:0;}

// ===== 初期化：Firestoreからデータ読み込み =====
async function initData(){
  setSyncBadge('同期中...');
  try {
    // 馬データ
    const hSnap = await getDocs(collection(db,'horses'));
    if(hSnap.empty){
      // 初回：デフォルトデータを投入
      for(const h of defaultHorses){
        await addDoc(collection(db,'horses'), h);
      }
      const hSnap2 = await getDocs(collection(db,'horses'));
      horses = hSnap2.docs.map(d=>({id:d.id,...d.data()}));
    } else {
      horses = hSnap.docs.map(d=>({id:d.id,...d.data()}));
    }
    retiredHorses = horses.filter(h=>h.retired);
    horses = horses.filter(h=>!h.retired).concat(retiredHorses);

    // メンバー
    const mSnap = await getDocs(collection(db,'members'));
    if(mSnap.empty){
      for(const m of defaultMembers){
        await addDoc(collection(db,'members'), m);
      }
      const mSnap2 = await getDocs(collection(db,'members'));
      members = mSnap2.docs.map(d=>({id:d.id,...d.data()}));
    } else {
      members = mSnap.docs.map(d=>({id:d.id,...d.data()}));
    }

    setSyncBadge('✓ 同期済み');
    render();
  } catch(e){
    setSyncBadge('⚠ オフライン');
    console.error(e);
    render();
  }
}

// ===== サブコレクション読み込み =====
async function loadSubData(horseId, colName){
  try {
    const snap = await getDocs(query(collection(db,'horses',horseId,colName), orderBy('createdAt','desc')));
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch { return []; }
}

  window.weightAddMode=false; window.weightEditIdx=null;
window.weightAddMode=false; window.weightEditIdx=null;
  editMemberId=null; deleteMemberConfirmId=null;
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render();
};

function render(){
  const c=document.getElementById('main-cnt');
  if(curTab==='horses') selHorse?renderDetail(c):renderList(c);
  else if(curTab==='daily') renderDaily(c);
  else if(curTab==='training') renderTraining(c);
  else if(curTab==='feed') renderFeed(c);
  else if(curTab==='photos') renderPhotos(c);
  else if(curTab==='record') renderDailyForm(c);
  else if(curTab==='newreg') renderNewHorse(c);
  else if(curTab==='retired') retiredSel?renderRetiredDetail(c):renderRetiredList(c);
  else if(curTab==='member') renderMembers(c);
}

          <div style="font-size:15px;font-weight:600;color:#111">${w[w.length-1]}kg</div>
          <div style="font-size:11px;color:${diff>=0?'#2E7D32':'#C62828'}">${ds}kg</div>

    </div>`;

}

async function renderDetail(c){
  const h=horses.find(x=>x.id===selHorse);
  if(!h){selHorse=null;render();return;}
  const w=h.weight||[0,0,0,0,0,0,0];
  const mx=Math.max(...w),mn=Math.min(...w),rng=mx-mn||1;

  // グラフ（SVG・1kg罫線・数値左外側・バーと被らない）
  const labelW=40, svgW=320, svgH=90, chartW=svgW-labelW-4;
  const barW=Math.floor((chartW-8)/7)-3, x0=labelW+4;
  let svgBars='',svgGrid='';
  // 横罫線と数値（左側に配置、バーと重ならない）
  for(let kg=0;kg<=rng;kg++){
    const y=Math.round(svgH-((kg/rng)*svgH*0.78+svgH*0.12));
    const lineVal=mn+kg;
    // 全ての1kg罫線（薄い色）
    svgGrid+=`<line x1="${labelW}" y1="${y}" x2="${svgW}" y2="${y}" stroke="${kg===0||kg===rng?'#c8d8e8':'#eaf0f6'}" stroke-width="${kg===0||kg===rng?'1.2':'0.8'}"/>`;
    // 数値はバーエリア外の左側に表示（全kg表示、ただし重なる場合は間引く）
    const showLabel = rng<=10 ? true : (kg%2===0||kg===rng);
    if(showLabel){
      svgGrid+=`<text x="${labelW-5}" y="${y+3}" font-size="7.5" fill="#999" text-anchor="end" font-family="sans-serif">${lineVal}</text>`;
    }
  }
  // バー（バーエリアはlabelW〜svgWの範囲のみ）
  w.forEach((v,i)=>{
    const barH=Math.round(((v-mn)/rng)*svgH*0.78+svgH*0.12);
    const bx=x0+i*(barW+3);
    const isToday=i===w.length-1;
    svgBars+=`<rect x="${bx}" y="${svgH-barH}" width="${barW}" height="${barH}" fill="${isToday?'#1a3a5c':'#90CAF9'}" rx="2"/>`;
    // 今日のバーに体重値を表示
    if(isToday) svgBars+=`<text x="${bx+barW/2}" y="${svgH-barH-3}" font-size="7" fill="#1a3a5c" text-anchor="middle" font-weight="bold">${v}</text>`;
  });
  // 曜日ラベル（バーの下）
  const svgLabels=['月','火','水','木','金','土','日'].map((d,i)=>{
    const bx=x0+i*(barW+3)+barW/2;
    const isToday=i===w.length-1;
    return`<text x="${bx}" y="${svgH+11}" font-size="8" fill="${isToday?'#1a3a5c':'#aaa'}" text-anchor="middle" font-weight="${isToday?'bold':'normal'}">${d}</text>`;
  }).join('');

  // サブデータ読み込み
  if(!trLogs[selHorse]) trLogs[selHorse]=await loadSubData(selHorse,'training');
  if(!reports[selHorse]) reports[selHorse]=await loadSubData(selHorse,'reports');
  if(!photos[selHorse]) photos[selHorse]=await loadSubData(selHorse,'photos');
  if(!raceLogs[selHorse]) raceLogs[selHorse]=await loadSubData(selHorse,'races');
  const dl=(trLogs[selHorse]||[]).slice(0,3);
  const reps=reports[selHorse]||[];
  const phList=photos[selHorse]||[];

  const infoSection=editInfo?`
    <div class="sec" style="display:flex;justify-content:space-between;align-items:center"><span>基本情報（編集中）</span>
      <div style="display:flex;gap:6px">
        <button class="edit-btn" style="background:#1a3a5c;color:#fff;border-color:#1a3a5c" onclick="saveInfo('${h.id}')">保存</button>
        <button class="edit-btn" onclick="editInfo=false;render()">キャンセル</button>
      </div></div>
    <div class="card">
      <div class="frow"><label>馬名</label><input id="ei-name" value="${h.name}"></div>
      <div class="frow"><label>年齢</label><input id="ei-age" value="${h.age}"></div>
      <div class="frow"><label>性別</label><select id="ei-sex"><option ${h.sex==='牡'?'selected':''}>牡</option><option ${h.sex==='牝'?'selected':''}>牝</option><option ${h.sex==='騸'?'selected':''}>騸</option></select></div>
      <div class="frow"><label>毛色</label><select id="ei-color">${['鹿毛','黒鹿毛','青鹿毛','青毛','芦毛','栗毛','白毛','佐目毛','河原毛'].map(x=>`<option ${h.color===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="frow"><label>父</label><input id="ei-sire" value="${h.sire}"></div>
      <div class="frow"><label>母</label><input id="ei-dam" value="${h.dam}"></div>

  c.innerHTML=`

window.saveWeight = async function(hid){
  const valEl=document.getElementById('wt-val');
  const val=parseInt(valEl?.value);
  if(!val||val<300||val>700){alert('正しい体重を入力してください（300〜700kg）');return;}
  const h=horses.find(x=>x.id===hid);
  if(!h) return;
  let newW=[...h.weight];
  if(window.weightEditIdx!==null){
    // 既存の日の体重を編集
    newW[window.weightEditIdx]=val;
  } else {
    // 新規追加（末尾に追加して7日分に保つ）
    newW.push(val);
    newW=newW.slice(-7);
  }
  await updateDoc(doc(db,'horses',hid),{weight:newW});
  h.weight=newW;
  window.weightAddMode=false; window.weightEditIdx=null;
  showToast('✅ 体重を保存しました'); render();
};

async function updateDetailRaceRecord(hid){
  const logs=raceLogs[hid]||[];
  const total=logs.length;
  const w1=logs.filter(l=>l.rank==='1着').length;
  const w2=logs.filter(l=>l.rank==='2着').length;
  const w3=logs.filter(l=>l.rank==='3着').length;
  const recordStr=`${total}戦${w1}勝2着${w2}回3着${w3}回`;
  await updateDoc(doc(db,'horses',hid),{record:recordStr});
  const h=horses.find(x=>x.id===hid);if(h) h.record=recordStr;
}

      <div class="frow"><label>飼料①</label><input type="text" id="f-feed1" placeholder="例: オーツ麦 4kg"></div>
      <div class="frow"><label>飼料②</label><input type="text" id="f-feed2" placeholder="例: 干し草 5kg"></div>
      <div class="frow"><label>飼料③（任意）</label><input type="text" id="f-feed3" placeholder="例: 配合飼料 2kg"></div>
    </div>
    <div class="sec">調教・メモ</div>
    <div class="card">
      <div class="frow"><label>調教メニュー</label><textarea id="f-training" placeholder="例: 軽キャンター 2000m・常歩 30分"></textarea></div>
      <div class="frow"><label>メモ・特記事項</label><textarea id="f-note" placeholder="例: 食欲旺盛、脚元問題なし"></textarea></div>
    </div>
    <button class="save-btn" onclick="saveDailyRecord()">記録を保存</button>
    <div style="height:24px"></div>`;
}

window.saveDailyRecord = async function(){
  const hId=document.getElementById('f-horse').value;
  const w=parseInt(document.getElementById('f-weight').value);
  if(!hId||!w){alert('馬と体重を入力してください');return;}
  const h=horses.find(x=>x.id===hId);
  if(h){
    const newW=[...h.weight.slice(-6),w];
    await updateDoc(doc(db,'horses',hId),{weight:newW});
    h.weight=newW;
  }
  const training=document.getElementById('f-training').value.trim();
  const note=document.getElementById('f-note').value.trim();
  if(training){
    const dateStr=`${NOW.getMonth()+1}/${NOW.getDate()}`;
    const tData={date:dateStr,menu:training,note,createdAt:Date.now()};
    const tRef=await addDoc(collection(db,'horses',hId,'training'),tData);
    if(!trLogs[hId]) trLogs[hId]=[];
    trLogs[hId].unshift({id:tRef.id,...tData});
  }
  const feeds=[document.getElementById('f-feed1').value,document.getElementById('f-feed2').value,document.getElementById('f-feed3').value].filter(Boolean);
  if(feeds.length){
    const dateStr=`${NOW.getMonth()+1}/${NOW.getDate()}`;
    const fData={date:dateStr,items:feeds.join('・'),note:'',createdAt:Date.now()};
    const fRef=await addDoc(collection(db,'horses',hId,'feed'),fData);
    if(!feedLogs[hId]) feedLogs[hId]=[];
    feedLogs[hId].unshift({id:fRef.id,...fData});
  }
  showToast('✅ 記録を保存しました'); goTab('horses');
};

// ===== 新規登録 =====
function renderNewHorse(c){
  c.innerHTML=`<div class="sec">基本情報</div>
    <div class="card">
      <div class="frow"><label>馬名 <span style="color:#C62828">*</span></label><input type="text" id="nf-name" placeholder="例: サクラエース"></div>
      <div class="frow"><label>年齢</label><input type="text" id="nf-age" placeholder="例: 3歳"></div>
      <div class="frow"><label>性別</label><select id="nf-sex"><option>牡</option><option>牝</option><option>騸</option></select></div>
      <div class="frow"><label>毛色</label><select id="nf-color">${['鹿毛','黒鹿毛','青鹿毛','青毛','芦毛','栗毛','白毛','佐目毛','河原毛'].map(x=>`<option>${x}</option>`).join('')}</select></div>
      <div class="frow"><label>生年月日</label><input type="text" id="nf-born" placeholder="例: 2023年4月5日"></div>
    </div>
    <div class="sec">血統・馬主</div>
    <div class="card">
      <div class="frow"><label>父</label><input type="text" id="nf-sire" placeholder="例: ディープインパクト"></div>
      <div class="frow"><label>母</label><input type="text" id="nf-dam" placeholder="例: サクラブーケ"></div>
      <div class="frow"><label>母父</label><input type="text" id="nf-damsire" placeholder="例: キングカメハメハ"></div>
      <div class="frow"><label>馬主</label><input type="text" id="nf-owner" placeholder="例: 田中 一郎"></div>
    </div>
    <div class="sec">成績・体重・状態</div>
    <div class="card">
      <div class="frow"><label>戦績</label><input type="text" id="nf-record" placeholder="例: 5戦2勝"></div>
      <div class="frow"><label>現在の馬体重 (kg) <span style="color:#C62828">*</span></label><input type="number" id="nf-weight" placeholder="例: 460"></div>
      <div class="frow"><label>状態</label><select id="nf-status"><option value="ok">良好</option><option value="warn">要観察</option></select></div>
      <div class="frow"><label>場所</label><select id="nf-location"><option value="stable">入厩</option><option value="pasture">放牧</option></select></div>
    </div>
    <button class="save-btn" onclick="saveNewHorse()">馬一覧に登録する</button>
    <div style="height:24px"></div>`;
}

window.saveNewHorse = async function(){
  const name=document.getElementById('nf-name').value.trim();
  const weight=parseInt(document.getElementById('nf-weight').value);
  if(!name){alert('馬名を入力してください');return;}
  if(!weight){alert('馬体重を入力してください');return;}
  const newH={
    name,age:document.getElementById('nf-age').value||'不明',
    sex:document.getElementById('nf-sex').value,
    color:document.getElementById('nf-color').value,
    sire:document.getElementById('nf-sire').value||'不明',
    dam:document.getElementById('nf-dam').value||'不明',
    dam_sire:document.getElementById('nf-damsire').value||'不明',
    owner:document.getElementById('nf-owner').value||'未登録',
    born:document.getElementById('nf-born').value||'不明',
    weight:[weight,weight,weight,weight,weight,weight,weight],
    record:document.getElementById('nf-record').value||'未出走',
    status:document.getElementById('nf-status').value,
    location:document.getElementById('nf-location').value,
    retired:false
  };
  const ref2=await addDoc(collection(db,'horses'),newH);
  horses.push({id:ref2.id,...newH});
  showToast(`✅ ${name} を登録しました！`); goTab('horses');
};

// ===== 退厩馬 =====
function renderRetiredList(c){
  const ret=horses.filter(h=>h.retired);
  if(!ret.length){c.innerHTML=`<div class="sec">退厩馬</div><div class="card" style="text-align:center;padding:24px;color:#aaa"><i class="ti ti-door-exit" style="font-size:32px;display:block;margin-bottom:8px"></i>退厩馬はいません</div>`;return;}
  c.innerHTML=`<div class="sec">退厩馬 ${ret.length}頭</div>`+ret.map(h=>`<div class="card" style="cursor:pointer" onclick="retiredSel='${h.id}';renderTab()">
    <div style="display:flex;align-items:center;gap:10px">
      ${hIcon(h.color,46)}
      <div style="flex:1"><div style="font-size:14px;font-weight:600;color:#546E7A">${h.name}</div><div style="font-size:11px;color:#aaa">${h.age} / ${h.sex}</div><span class="badge retired-b" style="margin-top:3px">退厩</span></div>
      <i class="ti ti-chevron-right" style="font-size:16px;color:#ccc"></i>
    </div></div>`).join('');
}
function renderRetiredDetail(c){
  const h=horses.find(x=>x.id===retiredSel);if(!h){retiredSel=null;render();return;}
  c.innerHTML=`<button class="back" onclick="retiredSel=null;renderTab()"><i class="ti ti-arrow-left"></i>退厩馬一覧に戻る</button>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        ${hIconR(h.color,60)}
        <div><div style="font-size:17px;font-weight:600;color:#546E7A">${h.name}</div><div style="font-size:11px;color:#aaa;margin-top:2px">${h.age} ${h.sex}</div><span class="badge retired-b" style="margin-top:4px">退厩</span></div>
      </div>
      <div class="irow"><span class="k">父</span><span class="v">${h.sire}</span></div>
      <div class="irow"><span class="k">母</span><span class="v">${h.dam}</span></div>
      <div class="irow"><span class="k">馬主</span><span class="v">${h.owner}</span></div>
      <div class="irow"><span class="k">戦績</span><span class="v">${h.record}</span></div>
    </div>
    <div class="card"><button onclick="restoreHorse('${h.id}')" style="width:100%;padding:10px;background:none;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a3a5c;cursor:pointer;font-family:inherit"><i class="ti ti-arrow-back-up" style="font-size:14px;vertical-align:-2px"></i> 在厩馬に戻す</button></div>`;
}
window.restoreHorse = async function(id){
  await updateDoc(doc(db,'horses',id),{retired:false});
  const h=horses.find(x=>x.id===id);if(h) h.retired=false;
  retiredSel=null; showToast('✅ 在厩馬に戻しました'); render();
};

// ===== メンバー =====
function mAv(n){return n?n.trim().charAt(0):'？';}
function renderMembers(c){
  c.innerHTML=`<div class="sec">メンバー (${members.length}/10)</div>`+
  members.map(m=>{
    if(editMemberId===m.id){
      return`<div class="card" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:40px;height:40px;border-radius:50%;background:#E3F2FD;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#1a3a5c;flex-shrink:0">${mAv(m.name)}</div>
          <div style="font-size:13px;font-weight:600;color:#1a3a5c">メンバー情報を編集</div>
        </div>
        <div class="frow"><label>名前</label><input id="m-name-${m.id}" value="${m.name}" style="font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;width:100%;font-family:inherit"></div>
        <div class="frow"><label>役割</label><select id="m-role-${m.id}" style="font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;width:100%;font-family:inherit">
          ${['調教師','厩務員','騎手','獣医師','馬主','その他'].map(r=>`<option ${m.role===r?'selected':''}>${r}</option>`).join('')}
        </select></div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button onclick="saveMember('${m.id}')" style="flex:1;padding:9px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">保存</button>
          <button onclick="editMemberId=null;deleteMemberConfirmId=null;renderTab()" style="flex:1;padding:9px;background:none;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#666">キャンセル</button>
        </div>
        ${deleteMemberConfirmId===m.id
          ?`<div style="margin-top:10px;padding:10px;background:#fff5f5;border-radius:8px;border:1px solid #ffcdd2"><div style="font-size:13px;color:#C62828;font-weight:600;margin-bottom:8px">本当に「${m.name}」を削除しますか？</div><div style="display:flex;gap:8px"><button onclick="execDeleteMember('${m.id}')" style="flex:1;padding:9px;background:#C62828;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">削除する</button><button onclick="deleteMemberConfirmId=null;renderTab()" style="flex:1;padding:9px;background:none;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#666">キャンセル</button></div></div>`
          :`<button onclick="deleteMemberConfirmId='${m.id}';renderTab()" style="width:100%;margin-top:8px;padding:9px;background:none;border:1px solid #C62828;border-radius:8px;font-size:13px;color:#C62828;cursor:pointer;font-family:inherit;font-weight:600"><i class="ti ti-trash" style="font-size:13px;vertical-align:-1px"></i> このメンバーを削除</button>`}
      </div>`;
    }
    return`<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="width:40px;height:40px;border-radius:50%;background:#E3F2FD;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#1a3a5c;flex-shrink:0">${mAv(m.name)}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600;color:#111">${m.name}</div><div style="font-size:12px;color:#888">${m.role}</div></div>
      <button onclick="editMemberId='${m.id}';deleteMemberConfirmId=null;renderTab()" style="padding:6px 12px;background:none;border:1px solid #1a3a5c;border-radius:6px;font-size:12px;color:#1a3a5c;cursor:pointer;font-family:inherit;font-weight:600;flex-shrink:0"><i class="ti ti-pencil" style="font-size:12px;vertical-align:-1px"></i> 編集</button>
    </div>`;
  }).join('')+
  `<button onclick="addMember()" style="width:100%;padding:11px;margin-top:4px;background:none;border:1px dashed #1a3a5c;border-radius:8px;color:#1a3a5c;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600"><i class="ti ti-user-plus" style="font-size:14px;vertical-align:-2px"></i> メンバーを追加</button>`;
}

window.saveMember = async function(id){
  const m=members.find(x=>x.id===id);if(!m)return;
  const n=document.getElementById('m-name-'+id)?.value.trim();if(!n){alert('名前を入力してください');return;}
  const r=document.getElementById('m-role-'+id)?.value||m.role;
  await updateDoc(doc(db,'members',id),{name:n,role:r});
  m.name=n;m.role=r;editMemberId=null;deleteMemberConfirmId=null; showToast('✅ 保存しました'); render();
};
window.execDeleteMember = async function(id){
  await deleteDoc(doc(db,'members',id));
  members=members.filter(x=>x.id!==id);editMemberId=null;deleteMemberConfirmId=null; showToast('🗑 削除しました'); render();
};
window.addMember = async function(){
  if(members.length>=10){alert('メンバーは10人までです');return;}
  const newM={name:'新しいメンバー',role:'厩務員'};
  const ref2=await addDoc(collection(db,'members'),newM);
  members.push({id:ref2.id,...newM});
  editMemberId=ref2.id;deleteMemberConfirmId=null; render();
};

// ===== 起動 =====
initData();
</script>
