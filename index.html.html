// ===== 初期化 =====
function initApp(){
  setSyncBadge('読込中...');
  db.collection('horses').get().then(function(snap){
    if(snap.empty){
      var batch = db.batch();
      defaultHorses.forEach(function(h){
        batch.set(db.collection('horses').doc(), h);
      });
      return batch.commit().then(function(){
        return db.collection('horses').get();
      });
    }
    return snap;
  }).then(function(snap){
    horses = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    return db.collection('members').get();
  }).then(function(snap){
    if(snap.empty){
      var batch = db.batch();
      defaultMembers.forEach(function(m){
        batch.set(db.collection('members').doc(), m);
      });
      return batch.commit().then(function(){
        return db.collection('members').get();
      });
    }
    return snap;
  }).then(function(snap){
    members = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    setSyncBadge('✓ 同期済み');
    render();
  }).catch(function(e){
    console.error('Firebaseエラー:', e);
    setSyncBadge('⚠ オフライン(デモ)');
    // Firebaseに接続できない場合はデフォルトデータで表示
    horses = defaultHorses.map(function(h,i){ return Object.assign({id:'demo_'+i}, h); });
    members = defaultMembers.map(function(m,i){ return Object.assign({id:'mem_'+i}, m); });
    render();
  });
}

  document.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('active'); });

  try {

  else if(curTab==='training') renderTraining(c);
  else if(curTab==='feed') renderFeed(c);
  else if(curTab==='treat') renderTreat(c);
  else if(curTab==='photos') renderPhotos(c);
  else if(curTab==='record') renderRecord(c);
  else if(curTab==='newreg') renderNewReg(c);
  else if(curTab==='retired'){ if(retiredSel) renderRetiredDetail(c); else renderRetiredList(c); }
  else if(curTab==='member') renderMembers(c);
  else if(curTab==='ownerrep'){ if(orHorse) renderOwnerRepDetail(c); else if(orOwner) renderOwnerRepHorseList(c); else renderOwnerRepOwnerList(c); }
  } catch(e){
    console.error('render error:', e);
    c.innerHTML = '<div style="padding:20px;color:#C62828;font-size:13px"><strong>表示エラー:</strong><br>' + e.message + '</div>';
  }
}

// ===== 馬一覧 =====
function renderList(c){
  var active = horses.filter(function(h){ return !h.retired; });
  var html = '<div class="sec">在厩馬 '+active.length+'頭</div>';
  active.forEach(function(h){
    var w=h.weight||[0,0]; var diff=w[w.length-1]-w[w.length-2];
    var ds=(diff>=0?'+':'')+diff;
    html += '<div class="card" style="cursor:pointer" onclick="openHorse(\''+h.id+'\')">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +hIcon(50)
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:15px;font-weight:600;color:#111">'+h.name+'</div>'
      +'<div style="font-size:11px;color:#888;margin-top:1px">'+h.age+' / '+h.sex+' / '+h.color+'</div>'
      +'<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">'
      +'<span class="badge '+(h.status==='ok'?'ok':'warn')+'">'+(h.status==='ok'?'良好':'要観察')+'</span>'
      +'<span class="badge '+(h.location==='stable'?'b-s':'b-p')+'">'+(h.location==='stable'?'入厩':'放牧')+'</span>'
      +'</div></div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div style="font-size:15px;font-weight:600;color:#111">'+w[w.length-1]+'kg</div>'
      +'<div style="font-size:11px;color:'+(diff>=0?'#2E7D32':'#C62828')+'">'+ds+'kg</div>'
      +'</div>'
      +'<i class="ti ti-chevron-right" style="font-size:16px;color:#ccc;flex-shrink:0"></i>'
      +'</div></div>';
  });
  c.innerHTML = html;
}

function openHorse(id){
  selHorse=id; editInfo=false; retireChk=false; reportModal=false;
  weightAddMode=false; weightEditIdx=null;
  raceAddMode=false; raceEditId=null; raceDelConfirm=null;
  // サブデータ読込
  var promises = [];
  if(!trLogs[id]) promises.push(loadSub(id,'training').then(function(d){ trLogs[id]=d; }));
  if(!feedLogs[id]) promises.push(loadSub(id,'feed').then(function(d){ feedLogs[id]=d; }));
  if(!reports[id]) promises.push(loadSub(id,'reports').then(function(d){ reports[id]=d; }));
  if(!photos[id]) promises.push(loadSub(id,'photos').then(function(d){ photos[id]=d; }));
  if(!raceLogs[id]) promises.push(loadSub(id,'races').then(function(d){ raceLogs[id]=d; }));
  if(!treatLogs[id]) promises.push(loadSub(id,'treatments').then(function(d){ treatLogs[id]=d; }));
  Promise.all(promises).then(function(){ render(); });
  render(); // 一旦表示
}

// ===== 馬詳細 =====
function renderDetail(c){
  var h = horses.find(function(x){ return x.id===selHorse; });
  if(!h){ selHorse=null; render(); return; }
  var w=h.weight||[0,0,0,0,0,0,0];
  while(w.length<7) w.unshift(w[0]);
  var mx=Math.max.apply(null,w), mn=Math.min.apply(null,w), rng=mx-mn||1;

  // SVGグラフ
  var labelW=40,svgW=320,svgH=90,chartW=svgW-labelW-4;
  var barW=Math.floor((chartW-8)/7)-3, x0=labelW+4;
  var grid='', bars='', lbls='';
  for(var kg=0;kg<=rng;kg++){
    var y=Math.round(svgH-((kg/rng)*svgH*0.78+svgH*0.12));
    grid+='<line x1="'+labelW+'" y1="'+y+'" x2="'+svgW+'" y2="'+y+'" stroke="'+(kg===0||kg===rng?'#c8d8e8':'#eaf0f6')+'" stroke-width="0.8"/>';
    var showL = rng<=10 ? true : (kg%2===0||kg===rng);
    if(showL) grid+='<text x="'+(labelW-5)+'" y="'+(y+3)+'" font-size="7.5" fill="#999" text-anchor="end">'+(mn+kg)+'</text>';
  }
  var days=['月','火','水','木','金','土','日'];
  w.forEach(function(v,i){
    var barH=Math.round(((v-mn)/rng)*svgH*0.78+svgH*0.12);
    var bx=x0+i*(barW+3);
    var isT=i===w.length-1;
    bars+='<rect x="'+bx+'" y="'+(svgH-barH)+'" width="'+barW+'" height="'+barH+'" fill="'+(isT?'#1a3a5c':'#90CAF9')+'" rx="2"/>';
    if(isT) bars+='<text x="'+(bx+barW/2)+'" y="'+(svgH-barH-3)+'" font-size="7" fill="#1a3a5c" text-anchor="middle" font-weight="bold">'+v+'</text>';
    lbls+='<text x="'+(bx+barW/2)+'" y="'+(svgH+11)+'" font-size="8" fill="'+(isT?'#1a3a5c':'#aaa')+'" text-anchor="middle" font-weight="'+(isT?'bold':'normal')+'">'+days[i]+'</text>';
  });

  var diff = w[w.length-1]-w[w.length-2];

  // 基本情報セクション

      +frow('毛色','<select id="ei-color">'+['鹿毛','黒鹿毛','青鹿毛','青毛','芦毛','栗毛','白毛','佐目毛','河原毛'].map(function(x){ return '<option '+(h.color===x?'selected':'')+'>'+x+'</option>'; }).join('')+'</select>')

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function irow(k,v){ return '<div class="irow"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }
function frow(label,input){ return '<div class="frow"><label>'+label+'</label>'+input+'</div>'; }
function raceDateToVal(d){ if(!d) return todayVal; var p=d.split('/'); if(p.length===2) return NOW.getFullYear()+'-'+pad(parseInt(p[0]))+'-'+pad(parseInt(p[1])); return todayVal; }
function gv(id){ var el=document.getElementById(id); return el?el.value.trim():''; }

function saveWeight(hid){
  var val=parseInt(gv('wt-val'));
  if(!val||val<300||val>700){ alert('正しい体重を入力してください（300〜700kg）'); return; }
  var h=horses.find(function(x){return x.id===hid;}); if(!h) return;

    h.weight=newW; weightAddMode=false; weightEditIdx=null; showToast('✅ 体重を保存しました'); render();

  if(dv){ var p=dv.split('-'); dt=p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日 '+pad(NOW.getHours())+':'+pad(NOW.getMinutes()); }

// ===== 写真 =====
function handlePhoto(e,hid){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var sRef=storage.ref('horses/'+hid+'/'+Date.now()+'.jpg');
    sRef.putString(ev.target.result,'data_url').then(function(){
      return sRef.getDownloadURL();
    }).then(function(url){
      var label=(NOW.getMonth()+1)+'/'+NOW.getDate()+' 撮影';
      var data={url:url,label:label,createdAt:Date.now()};
      db.collection('horses').doc(hid).collection('photos').add(data).then(function(ref){
        if(!photos[hid]) photos[hid]=[];
        photos[hid].unshift(Object.assign({id:ref.id},data));
        showToast('✅ 写真を保存しました'); render();
      });
    }).catch(function(err){ alert('写真の保存に失敗しました: '+err.message); });
  };
  reader.readAsDataURL(file);
}

function saveTreat(){
  var symptom=gv('tx-symptom');
  if(!symptom){ alert('症状を入力してください'); return; }
  var dv=gv('tx-date'); var dateStr=dv?dateFullLabel(dv):todayStr;
  var nextV=gv('tx-next'); var nextStr=nextV?dateFullLabel(nextV):'';
  var data={date:dateStr,dateVal:dv||todayVal,symptom:symptom,treatment:gv('tx-treatment'),vet:gv('tx-vet'),medicine:gv('tx-medicine'),nextDate:nextStr,nextVal:nextV||'',createdAt:Date.now()};
  var p;
  if(treatEditId){
    p=db.collection('horses').doc(treatHorseId).collection('treatments').doc(treatEditId).update(data).then(function(){
      var l=(treatLogs[treatHorseId]||[]).find(function(x){return x.id===treatEditId;}); if(l) Object.assign(l,data);
    });
  } else {
    p=db.collection('horses').doc(treatHorseId).collection('treatments').add(data).then(function(ref){
      if(!treatLogs[treatHorseId]) treatLogs[treatHorseId]=[];
      treatLogs[treatHorseId].unshift(Object.assign({id:ref.id},data));
    });
  }
  p.then(function(){ treatAddMode=false; treatEditId=null; treatDelConfirm=null; showToast('✅ 保存しました'); render(); });
}
function deleteTreat(lid){
  db.collection('horses').doc(treatHorseId).collection('treatments').doc(lid).delete().then(function(){
    if(treatLogs[treatHorseId]) treatLogs[treatHorseId]=treatLogs[treatHorseId].filter(function(x){return x.id!==lid;});
    treatAddMode=false; treatEditId=null; treatDelConfirm=null; showToast('🗑 削除しました'); render();
  });
}

function handlePhotoTab(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var sRef=storage.ref('horses/'+photoHorseId+'/'+Date.now()+'.jpg');
    sRef.putString(ev.target.result,'data_url').then(function(){
      return sRef.getDownloadURL();
    }).then(function(url){
      var label=(NOW.getMonth()+1)+'/'+NOW.getDate()+' 撮影';
      var data={url:url,label:label,createdAt:Date.now()};
      db.collection('horses').doc(photoHorseId).collection('photos').add(data).then(function(ref){
        if(!photos[photoHorseId]) photos[photoHorseId]=[];
        photos[photoHorseId].unshift(Object.assign({id:ref.id},data));
        showToast('✅ 写真を保存しました'); render();
      });
    }).catch(function(err){ alert('写真の保存に失敗しました: '+err.message); });
  };
  reader.readAsDataURL(file);
}

  if(orMonthlyCache[hid]) return;

  db.collection('horses').doc(hid).collection('ownerReports').get().then(function(snap){
    snap.docs.forEach(function(d){ orMonthlyCache[hid][d.id]=d.data(); });
    render();
  }).catch(function(e){ console.error(e); });
}

function renderOwnerRepDetail(c){
  var h=horses.find(function(x){return x.id===orHorse;});
  if(!h){ orHorse=null; render(); return; }
  var data=orMonthlyCache[orHorse]||{};
  var months=Object.keys(data).sort().reverse();
  if(months.length>0 && (!orMonth||months.indexOf(orMonth)===-1)) orMonth=months[0];

  var html='<button class="back-btn" onclick="orHorse=null;render()"><i class="ti ti-arrow-left"></i>'+esc(orOwner)+' 様の馬一覧に戻る</button>';

    html+='<button class="hsel-btn'+(m===orMonth?' active':'')+'" style="position:relative" onclick="orMonth=\''+m+'\';orEditingReport=false;render()">'+ownerRepMonthLabel(m)
      +' <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+(ap?'#2E7D32':'#E65100')+';margin-left:4px;vertical-align:middle"></span></button>';
  });
  html+='<button class="hsel-btn" style="border-style:dashed" onclick="addOwnerRepMonth()"><i class="ti ti-plus" style="font-size:11px;vertical-align:-1px"></i> 月を追加</button>';
  html+='</div>';

  if(months.length===0){
    html+='<div style="text-align:center;padding:24px;color:#aaa"><i class="ti ti-calendar-plus" style="font-size:32px;display:block;margin-bottom:8px"></i>「月を追加」から報告を作成できます</div>';

  var md=data[orMonth];

  if(md.approved){
    html+='<div style="display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:11px;margin-bottom:12px;font-size:13px;font-weight:600;background:#E8F5E9;color:#2E7D32;border:1px solid #C8E6C9"><i class="ti ti-circle-check" style="font-size:17px"></i>確認済み（馬主に公開中）</div>';

  }

  // 報告事項
  html+='<div class="sec">報告事項</div><div class="card">';
  if(orEditingReport){
    html+=frow('報告内容','<textarea id="or-report" style="height:90px" placeholder="馬主様への報告内容">'+esc(md.report||'')+'</textarea>')
      +'<button class="save-btn" onclick="saveOwnerRepReport()">報告を保存</button>'
      +'<button style="width:100%;margin-top:8px;padding:10px;background:none;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#666" onclick="orEditingReport=false;render()">キャンセル</button>';
  } else if(md.report){
    html+='<div style="background:#f7f7f7;border-radius:10px;padding:12px;font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap">'+esc(md.report)+'</div>'
      +'<button style="width:100%;margin-top:10px;padding:9px;background:none;border:1px solid #ddd;border-radius:8px;font-size:12px;color:#1a3a5c;cursor:pointer;font-family:inherit" onclick="orEditingReport=true;render()"><i class="ti ti-pencil" style="font-size:13px;vertical-align:-1px"></i> 報告を編集</button>';
  } else {
    html+='<div style="text-align:center;padding:14px;color:#aaa;font-size:13px">報告事項がありません</div>'
      +'<button style="width:100%;margin-top:8px;padding:10px;background:none;border:1.5px dashed #bbb;border-radius:10px;color:#666;cursor:pointer;font-size:13px;font-family:inherit" onclick="orEditingReport=true;render()"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px"></i> 報告を作成</button>';
  }
  html+='</div>';

  // 請求書
  html+='<div class="sec">請求書（写真・PDF）</div><div class="card">';
  (md.invoices||[]).forEach(function(iv,i){
    html+='<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#f7f7f7;border-radius:9px;margin-bottom:7px">'
      +'<div style="width:34px;height:34px;border-radius:8px;background:#3a3a3a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0"><i class="ti ti-'+(iv.type==='img'?'photo':'file-type-pdf')+'"></i></div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+iv.name+'</div><div style="font-size:10px;color:#999">'+(iv.type==='img'?'画像':'PDF')+' · '+iv.size+'</div></div>'
      +'<button onclick="delOwnerRepInvoice('+i+')" style="background:none;border:none;color:#c25;cursor:pointer;font-size:16px"><i class="ti ti-trash"></i></button></div>';
  });
  html+='<div style="display:flex;gap:8px;margin-top:4px">'
    +'<button style="flex:1;padding:10px;background:none;border:1.5px dashed #bbb;border-radius:10px;color:#666;cursor:pointer;font-size:12px;font-family:inherit" onclick="addOwnerRepInvoice(\'pdf\')"><i class="ti ti-file-type-pdf" style="font-size:14px;vertical-align:-2px"></i> PDFを添付</button>'
    +'<button style="flex:1;padding:10px;background:none;border:1.5px dashed #bbb;border-radius:10px;color:#666;cursor:pointer;font-size:12px;font-family:inherit" onclick="addOwnerRepInvoice(\'img\')"><i class="ti ti-camera" style="font-size:14px;vertical-align:-2px"></i> 写メを添付</button></div>';
  html+='</div>';

  // 写真
  html+='<div class="sec">写真</div><div class="card">';
  if((md.photos||[]).length>0){
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px">';
    md.photos.forEach(function(p,i){
      html+='<div style="aspect-ratio:1;border-radius:9px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:22px;position:relative"><i class="ti ti-photo"></i>'
        +'<button onclick="delOwnerRepPhoto('+i+')" style="position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer">×</button></div>';
    });
    html+='</div>';
  } else {
    html+='<div style="text-align:center;padding:14px;color:#aaa;font-size:13px">写真がありません</div>';
  }
  html+='<button style="width:100%;margin-top:8px;padding:10px;background:none;border:1.5px dashed #bbb;border-radius:10px;color:#666;cursor:pointer;font-size:13px;font-family:inherit" onclick="addOwnerRepPhoto()"><i class="ti ti-camera" style="font-size:14px;vertical-align:-2px"></i> 写真を追加</button>';
  html+='</div>';

  // 承認
  html+='<div class="sec">馬主への共有</div><div class="card">';
  if(md.approved){
    html+='<div style="font-size:12px;color:#2E7D32;font-weight:600;margin-bottom:8px"><i class="ti ti-circle-check" style="vertical-align:-2px"></i> 馬主様に公開されています。</div>'
      +'<button style="width:100%;padding:11px;background:none;border:1px solid #E65100;color:#E65100;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600" onclick="unapproveOwnerRep()"><i class="ti ti-arrow-back-up" style="font-size:13px;vertical-align:-1px"></i> 下書きに戻す（非公開）</button>';
  } else {
    html+='<div style="font-size:12px;color:#E65100;line-height:1.6;margin-bottom:10px">内容を確認し、公開してよければ「確認（承認）」を押してください。</div>'
      +'<button style="width:100%;padding:13px;background:#2E7D32;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit" onclick="approveOwnerRep()"><i class="ti ti-circle-check" style="font-size:16px;vertical-align:-2px"></i> 確認（承認）して馬主に共有</button>';
  }
  html+='</div>';

  html+='<button class="red-outline" onclick="delOwnerRepMonth()"><i class="ti ti-trash" style="font-size:13px;vertical-align:-1px"></i> '+ownerRepMonthLabel(orMonth)+' を削除</button><div style="height:20px"></div>';

  c.innerHTML=html;
}

function ensureOwnerRepMonth(hid,m){
  if(!orMonthlyCache[hid]) orMonthlyCache[hid]={};
  if(!orMonthlyCache[hid][m]) orMonthlyCache[hid][m]={report:"",invoices:[],photos:[],approved:false};
}
function addOwnerRepMonth(){
  var m=prompt("登録する月を入力してください（例: "+ownerRepThisMonth()+"）", ownerRepThisMonth());
  if(!m) return;
  if(!/^\d{4}-\d{2}$/.test(m)){ alert('形式が正しくありません（例: 2026-07）'); return; }
  ensureOwnerRepMonth(orHorse,m);
  db.collection('horses').doc(orHorse).collection('ownerReports').doc(m).set(orMonthlyCache[orHorse][m]).then(function(){
    orMonth=m; orEditingReport=false; showToast('✅ '+ownerRepMonthLabel(m)+' を追加しました'); render();
  });
}
function delOwnerRepMonth(){
  if(!confirm(ownerRepMonthLabel(orMonth)+' のデータを削除しますか？')) return;
  db.collection('horses').doc(orHorse).collection('ownerReports').doc(orMonth).delete().then(function(){
    delete orMonthlyCache[orHorse][orMonth];
    orMonth=null; showToast('🗑 削除しました'); render();
  });
}
function saveOwnerRepData(){
  db.collection('horses').doc(orHorse).collection('ownerReports').doc(orMonth).set(orMonthlyCache[orHorse][orMonth]);
}
function saveOwnerRepReport(){
  var t=gv('or-report');
  ensureOwnerRepMonth(orHorse,orMonth);
  orMonthlyCache[orHorse][orMonth].report=t;
  saveOwnerRepData();
  orEditingReport=false; showToast('✅ 報告を保存しました'); render();
}
function addOwnerRepInvoice(type){
  ensureOwnerRepMonth(orHorse,orMonth);
  var arr=orMonthlyCache[orHorse][orMonth].invoices;
  if(type==='pdf'){
    arr.push({type:'pdf',name:'請求書_'+ownerRepMonthLabel(orMonth)+'.pdf',size:(120+Math.floor(Math.random()*150))+' KB'});
  } else {
    arr.push({type:'img',name:'請求書_写真'+(arr.length+1)+'.jpg',size:(0.8+Math.random()*1.5).toFixed(1)+' MB'});
  }
  saveOwnerRepData(); showToast('✅ 添付しました'); render();
}
function delOwnerRepInvoice(i){
  if(!confirm('この請求書を削除しますか？')) return;
  orMonthlyCache[orHorse][orMonth].invoices.splice(i,1);
  saveOwnerRepData(); showToast('🗑 削除しました'); render();
}
function addOwnerRepPhoto(){
  ensureOwnerRepMonth(orHorse,orMonth);
  orMonthlyCache[orHorse][orMonth].photos.push({label:(NOW.getMonth()+1)+'/'+NOW.getDate()+' 撮影'});
  saveOwnerRepData(); showToast('✅ 写真を追加しました'); render();
}
function delOwnerRepPhoto(i){
  orMonthlyCache[orHorse][orMonth].photos.splice(i,1);
  saveOwnerRepData(); showToast('🗑 削除しました'); render();
}
function approveOwnerRep(){
  orMonthlyCache[orHorse][orMonth].approved=true;
  saveOwnerRepData(); showToast('✅ 承認しました。馬主様に公開されます'); render();
}
function unapproveOwnerRep(){
  if(!confirm('下書きに戻すと馬主様には見えなくなります。よろしいですか？')) return;
  orMonthlyCache[orHorse][orMonth].approved=false;
  saveOwnerRepData(); showToast('下書きに戻しました'); render();
}

function renderMembers(c){
  var html='<div class="sec">メンバー ('+members.length+'/10)</div>';
  members.forEach(function(m){
    if(editMemberId===m.id){
      var dBtn='';
      if(memberDelConfirm===m.id){
        dBtn='<div class="del-confirm"><p>本当に「'+m.name+'」を削除しますか？</p><div class="btns"><button onclick="execDeleteMember(\''+m.id+'\')">削除する</button><button onclick="memberDelConfirm=null;render()">キャンセル</button></div></div>';
      } else {
        dBtn='<button class="red-outline" onclick="memberDelConfirm=\''+m.id+'\';render()"><i class="ti ti-trash" style="font-size:13px;vertical-align:-1px"></i> このメンバーを削除</button>';
      }
      html+='<div class="card" style="margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
        +'<div style="width:40px;height:40px;border-radius:50%;background:#E3F2FD;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#1a3a5c;flex-shrink:0">'+(m.name?m.name.trim().charAt(0):'？')+'</div>'
        +'<div style="font-size:13px;font-weight:600;color:#1a3a5c">メンバー情報を編集</div>'
        +'</div>'
        +frow('名前','<input id="m-name-'+m.id+'" value="'+esc(m.name)+'" style="font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;width:100%;font-family:inherit">')
        +frow('役割','<select id="m-role-'+m.id+'" style="font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;width:100%;font-family:inherit">'+['調教師','厩務員','騎手','獣医師','馬主','その他'].map(function(r){ return '<option '+(m.role===r?'selected':'')+'>'+r+'</option>'; }).join('')+'</select>')
        +'<div style="display:flex;gap:8px;margin-top:4px">'
        +'<button onclick="saveMember(\''+m.id+'\')" style="flex:1;padding:9px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">保存</button>'
        +'<button onclick="editMemberId=null;memberDelConfirm=null;render()" style="flex:1;padding:9px;background:none;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#666">キャンセル</button>'
        +'</div>'+dBtn+'</div>';
    } else {
      html+='<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
        +'<div style="width:40px;height:40px;border-radius:50%;background:#E3F2FD;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#1a3a5c;flex-shrink:0">'+(m.name?m.name.trim().charAt(0):'？')+'</div>'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:600;color:#111">'+m.name+'</div><div style="font-size:12px;color:#888">'+m.role+'</div></div>'
        +'<button class="edit-btn" onclick="editMemberId=\''+m.id+'\';memberDelConfirm=null;render()"><i class="ti ti-pencil" style="font-size:12px;vertical-align:-1px"></i> 編集</button>'
        +'</div>';
    }
  });
  html+='<button onclick="addMember()" style="width:100%;padding:11px;margin-top:4px;background:none;border:1px dashed #1a3a5c;border-radius:8px;color:#1a3a5c;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600"><i class="ti ti-user-plus" style="font-size:14px;vertical-align:-2px"></i> メンバーを追加</button>';
  c.innerHTML=html;
}
function saveMember(id){
  var m=members.find(function(x){return x.id===id;}); if(!m) return;
  var n=document.getElementById('m-name-'+id); var r=document.getElementById('m-role-'+id);
  if(!n||!n.value.trim()){ alert('名前を入力してください'); return; }
  var upd={name:n.value.trim(),role:r?r.value:m.role};
  db.collection('members').doc(id).update(upd).then(function(){
    Object.assign(m,upd); editMemberId=null; memberDelConfirm=null; showToast('✅ 保存しました'); render();
  });
}
function execDeleteMember(id){
  db.collection('members').doc(id).delete().then(function(){
    members=members.filter(function(x){return x.id!==id;});
    editMemberId=null; memberDelConfirm=null;
  orOwner=null; orHorse=null; orMonth=null; orEditingReport=false; showToast('🗑 削除しました'); render();
  });
}
function addMember(){
  if(members.length>=10){ alert('メンバーは10人までです'); return; }
  db.collection('members').add({name:'新しいメンバー',role:'厩務員'}).then(function(ref){
    members.push({id:ref.id,name:'新しいメンバー',role:'厩務員'});
    editMemberId=ref.id; memberDelConfirm=null; render();
  });
}

// ===== 起動 =====
window.onload = function(){
  initApp();
};
</script>
</body>
</html>
